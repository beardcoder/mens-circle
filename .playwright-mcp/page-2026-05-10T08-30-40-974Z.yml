          - heading "Was ist ein Männerkreis?" [level=2] [ref=e42]:
            - text: Was ist ein
            - text: Männerkreis?
          - paragraph [ref=e43]: Ein Männerkreis ist ein regelmäßiges Treffen von Männern, die sich in einem geschützten Rahmen begegnen möchten. Hier geht es nicht um Smalltalk oder Leistung – sondern um echte Verbindung, ehrliche Worte und das Gefühl, gehört und gesehen zu werden.
          - generic [ref=e44]:
            - generic [ref=e45]:
              - generic [ref=e46]: "01"
              - heading "Authentischer Austausch" [level=3] [ref=e47]
              - paragraph [ref=e48]: Hier darfst du sagen, was dich wirklich bewegt – ohne Maske, ohne Rolle.
            - generic [ref=e49]:
              - generic [ref=e50]: "02"
              - heading "Ehrliche Gemeinschaft" [level=3] [ref=e51]
              - paragraph [ref=e52]: Verbindung entsteht, wenn wir uns gegenseitig wirklich zuhören.
            - generic [ref=e53]:
              - generic [ref=e54]: "03"
              - heading "Persönliches Wachstum" [level=3] [ref=e55]
              - paragraph [ref=e56]: Durch Reflexion und Feedback entwickeln wir uns gemeinsam weiter.
        - paragraph [ref=e62]:
          - text: „Im Kreis sitzen Männer,
          - text: die sich trauen,
          - text: echt zu sein."
    - generic [ref=e64]:
      - img [ref=e70]
      - generic [ref=e73]:
        - paragraph [ref=e74]: Dein Begleiter
        - heading "Markus Sommer" [level=2] [ref=e75]:
          - text: Markus
          - text: Sommer
        - generic [ref=e76]:
          - paragraph [ref=e77]: Ich bin Markus, gebürtiger Niederbayer und Gründer des Männerkreises Straubing. Seit Jahren beschäftige ich mich mit der Frage, was es bedeutet, als Mann authentisch zu leben – jenseits von Rollenbildern und gesellschaftlichen Erwartungen.
          - paragraph [ref=e78]: "Der Männerkreis ist für mich ein Herzensanliegen: Ein Ort, an dem wir uns gegenseitig stärken, herausfordern und unterstützen können."
        - blockquote [ref=e79]:
          - paragraph [ref=e80]: »„Wahre Stärke zeigt sich nicht im Alleingang, sondern in der Bereitschaft, sich anderen zu öffnen."«
    - region "Die Reise im Kreis" [ref=e81]:
      - generic [ref=e82]:
        - generic [ref=e83]:
          - paragraph [ref=e84]: Der Weg
          - heading "Die Reise im Kreis" [level=2] [ref=e85]
          - paragraph [ref=e86]: Jedes Treffen folgt einem natürlichen Rhythmus
        - list [ref=e88]:
          - listitem [ref=e89]:
            - generic [ref=e91]:
              - generic [ref=e92]: Schritt
              - generic [ref=e93]: "01"
            - heading "Ankommen" [level=3] [ref=e94]
            - paragraph [ref=e95]: Wir beginnen mit einer Runde des Ankommens. Jeder teilt kurz, wie er gerade da ist – körperlich, emotional, mental.
          - listitem [ref=e96]:
            - generic [ref=e98]:
              - generic [ref=e99]: Schritt
              - generic [ref=e100]: "02"
            - heading "Öffnen" [level=3] [ref=e101]
            - paragraph [ref=e102]: Im geschützten Raum des Kreises öffnen wir uns. Themen, die uns bewegen, finden Raum und Gehör.
          - listitem [ref=e103]:
            - generic [ref=e105]:
              - generic [ref=e106]: Schritt
              - generic [ref=e107]: "03"
            - heading "Wachsen" [level=3] [ref=e108]
            - paragraph [ref=e109]: Durch ehrliches Feedback und Spiegelung entstehen neue Perspektiven. Wir lernen von und mit einander.
          - listitem [ref=e110]:
            - generic [ref=e112]:
              - generic [ref=e113]: Schritt
              - generic [ref=e114]: "04"
            - heading "Integrieren" [level=3] [ref=e115]
            - paragraph [ref=e116]: Zum Abschluss verankern wir das Erlebte. Was nehmen wir mit? Was setzen wir im Alltag um?
    - generic [ref=e118]:
      - generic [ref=e119]:
        - paragraph [ref=e120]: Fragen & Antworten
        - heading "Häufige Fragen" [level=2] [ref=e121]:
          - text: Häufige
          - text: Fragen
        - paragraph [ref=e122]: Alles, was du wissen solltest, bevor du zum ersten Mal dabei bist.
      - generic [ref=e123]:
        - generic [ref=e124]:
          - button "Für wen ist der Männerkreis?" [ref=e125]:
            - generic [ref=e126]: Für wen ist der Männerkreis?
            - img [ref=e128]
          - generic [ref=e130]: Der Männerkreis ist offen für alle Männer, die sich nach authentischem Austausch und echten Verbindungen sehnen. Es spielt keine Rolle, ob du 25 oder 65 bist, ob du in einer Beziehung lebst oder Single bist. Wichtig ist nur die Bereitschaft, dich auf den Prozess einzulassen und anderen Männern ehrlich und respektvoll zu begegnen.
        - generic [ref=e131]:
          - button "Wo und wie oft trifft sich der Kreis?" [ref=e132]:
            - generic [ref=e133]: Wo und wie oft trifft sich der Kreis?
            - img [ref=e135]
          - generic [ref=e137]: Wir treffen uns in Straubing – der genaue Ort wird bei der Anmeldung bekannt gegeben. Die Treffen finden regelmäßig statt, in der Regel alle zwei bis vier Wochen.
        - generic [ref=e138]:
          - button "Wie läuft ein Treffen ab?" [ref=e139]:
            - generic [ref=e140]: Wie läuft ein Treffen ab?
            - img [ref=e142]
          - generic [ref=e144]: "Ein Treffen dauert etwa 2-3 Stunden. Wir sitzen im Kreis – das ist mehr als nur eine Sitzordnung, es ist ein Symbol für Gleichwertigkeit. Der Ablauf folgt einem natürlichen Rhythmus: Ankommen, Öffnen, Wachsen, Integrieren. Es gibt keine starren Regeln, aber Leitlinien wie respektvolles Zuhören und Vertraulichkeit."
        - generic [ref=e145]:
          - button "Was kostet die Teilnahme?" [ref=e146]:
            - generic [ref=e147]: Was kostet die Teilnahme?
            - img [ref=e149]
          - generic [ref=e151]: "Der Männerkreis funktioniert auf Spendenbasis. Das bedeutet: Jeder gibt, was er kann und was ihm die Erfahrung wert ist. Finanzielle Gründe sollen niemanden davon abhalten, Teil des Kreises zu werden."
        - generic [ref=e152]:
          - button "Ist alles vertraulich?" [ref=e153]:
            - generic [ref=e154]: Ist alles vertraulich?
            - img [ref=e156]
          - generic [ref=e158]: Ja, absolut. Vertraulichkeit ist das Fundament des Männerkreises. Alles, was im Kreis geteilt wird, bleibt im Kreis.
        - generic [ref=e159]:
          - button "Ist das Therapie oder Coaching?" [ref=e160]:
            - generic [ref=e161]: Ist das Therapie oder Coaching?
            - img [ref=e163]
          - generic [ref=e165]: Nein. Der Männerkreis ist weder Therapie noch Coaching. Es geht nicht darum, Probleme zu lösen oder Ratschläge zu geben. Stattdessen bietet der Kreis einen Raum des Zuhörens und der Verbindung. Bei therapeutischem Bedarf empfehle ich professionelle Hilfe.
