version = "1"
php-version = "8.5"

[source]
paths = ["app", "config", "database", "routes", "tests"]
excludes = ["vendor", "storage", "bootstrap/cache"]

[linter.rules]
# Security rules
no-eval = { enabled = true }
no-variable-variable = { enabled = true }
sensitive-parameter = { enabled = true }
# Code quality
no-dead-store = { enabled = true }
no-redundant-use = { enabled = true }
no-redundant-readonly = { enabled = true }
strict-types = { enabled = true }
cyclomatic-complexity = { threshold = 10 }

[formatter]
# 120-char print-width is a pragmatic choice for modern PHP projects;
# Mago's formatter is opinionated and does not follow PER-CS line limits strictly.
# trailing-comma=true matches the project's previous php-cs-fixer @PER-CS risky rules.
print-width = 120
tab-width = 4
use-tabs = false
single-quote = true
trailing-comma = true

