# Welcome to Mago!
# For full documentation, see https://mago.carthage.software/tools/overview
php-version = "8.5.0"

[source]
workspace = "."
paths = ["app/", "bootstrap/app.php", "config/", "database/factories/", "database/migrations/", "database/seeders/", "routes/"]
includes = ["vendor"]
excludes = ["bootstrap/cache/"]

[formatter]
preset = "default"
print-width = 140

[linter]
integrations = ["laravel"]

[linter.rules]
ambiguous-function-call = { enabled = false }
literal-named-argument = { enabled = false }
# Halstead measures cognitive complexity. Filament resource forms and rich
# migrations legitimately exceed the default — raise the bar instead of
# fragmenting otherwise well-structured code.
halstead = { effort-threshold = 11000, volume-threshold = 5500 }
no-literal-password = { enabled = false }
too-many-methods = { threshold = 30 }
too-many-enum-cases = { enabled = false }
cyclomatic-complexity = { threshold = 200 }
kan-defect = { enabled = false }
excessive-parameter-list = { threshold = 12 }
# Subjective design preferences — disabled to keep the linter focused on
# correctness over style debates.
no-boolean-flag-parameter = { enabled = false }
no-else-clause = { enabled = false }

[analyzer]
plugins = []
find-unused-definitions = true
find-unused-expressions = true
analyze-dead-code = false
memoize-properties = true
strict-array-index-existence = true
check-throws = true
check-missing-override = true
find-unused-parameters = true
strict-list-index-checks = true
no-boolean-literal-comparison = false
check-missing-type-hints = false
register-super-globals = true

