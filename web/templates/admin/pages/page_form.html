{{define "content"}}
{{with .Data}}
<header class="page-head">
    <h1>Seite bearbeiten</h1>
    <a href="/admin/pages" class="btn btn--ghost">Zurück</a>
</header>
<form method="post" action="/admin/pages/{{.ID}}" class="form-card">
    <div class="form-grid">
        <label>Titel<input type="text" name="title" value="{{.Title}}" required></label>
        <label>Slug<input type="text" name="slug" value="{{.Slug}}" required></label>
        <label class="col-span-2">Meta-Beschreibung<textarea name="meta_description" rows="2">{{.MetaString "description"}}</textarea></label>
    </div>
    <label class="checkbox">
        <input type="checkbox" name="is_published" value="1" {{if .IsPublished}}checked{{end}}> Veröffentlicht
    </label>
    <div class="form-actions"><button type="submit" class="btn btn--primary">Speichern</button></div>
</form>

<section class="panel">
    <h2>Inhaltsblöcke</h2>
    <p class="muted">Diese Seite besteht aus {{len .ContentBlocks}} Blöcken.</p>
    <ol class="block-list">
        {{range .ContentBlocks}}
            <li><span class="badge badge--gray">{{.Type}}</span> <span class="muted">Reihenfolge {{.Order}}</span></li>
        {{end}}
    </ol>
</section>
{{end}}
{{end}}
